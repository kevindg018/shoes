<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Cloud Solutions</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Librerías para PDF y Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        input, select, textarea {
            color: #e2e8f0;
            background-color: #0f172a;
            border-color: #475569;
        }
        input::placeholder, textarea::placeholder {
            color: #94a3b8;
            opacity: 1;
        }
        input:focus, select:focus, textarea:focus {
            border-color: #f59e0b !important;
            outline: none;
        }

        @media print {
            body * { visibility: hidden; }
            #ticket-print-area, #ticket-print-area * { visibility: visible; }
            #ticket-print-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }

        .modal { transition: opacity 0.25s ease; }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen flex overflow-hidden text-slate-200">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-50 bg-slate-950 flex items-center justify-center">
        <div class="glass-panel p-8 rounded-xl shadow-2xl w-full max-w-md border border-slate-700">
            <div class="text-center mb-6">
               <i class="fas fa-cloud-arrow-up text-5xl text-amber-500 mb-4"></i>

                <h1 class="text-3xl font-bold text-white tracking-widest">New Cloud Solutions <span class="text-amber-500">POS</span></h1>
                <p class="text-slate-400">Control de Caja</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400">Usuario</label>
                    <input type="text" id="login-user" class="mt-1 block w-full rounded-md p-3 border border-slate-600 bg-slate-800 focus:border-amber-500" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400">Contraseña</label>
                    <input type="password" id="login-pass" class="mt-1 block w-full rounded-md p-3 border border-slate-600 bg-slate-800 focus:border-amber-500" placeholder="1234">
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-bold text-slate-900 bg-amber-500 hover:bg-amber-400 focus:outline-none transition transform hover:scale-105">
                    INGRESAR
                </button>
            </form>
        </div>
    </div>

    <!-- MAIN LAYOUT (Hidden by default) -->
    <div id="app-layout" class="relative flex w-full h-screen hidden">
        <div id="mobile-overlay" class="fixed inset-0 bg-slate-950/70 z-30 hidden md:hidden"></div>
        
        <!-- SIDEBAR -->
        <aside id="mobile-sidebar" class="fixed inset-y-0 left-0 z-40 w-72 max-w-[85vw] -translate-x-full md:translate-x-0 md:static md:w-64 bg-slate-900 text-slate-300 flex flex-col justify-between h-full shadow-2xl border-r border-slate-800 transition-transform duration-300">
            <div>
                <div class="p-6 border-b border-slate-800 flex items-start gap-3">
                    <button id="mobile-close-btn" class="md:hidden ml-auto text-slate-300 hover:text-amber-500" aria-label="Cerrar menú">
                        <i class="fas fa-xmark text-xl"></i>
                    </button>
                    <i class="fas fa-cloud-arrow-up text-5xl text-amber-500 mb-4"></i>

                    <div>
                        <h2 class="text-xl font-bold tracking-wider text-white">NEW CLOUD SOLUTIONS</h2>
                        <p class="text-xs text-amber-500 font-mono" id="user-role-display">ADMIN</p>
                    </div>
                </div>
                <nav class="mt-6 flex-1 overflow-y-auto space-y-1 px-2">
                    <a href="#" onclick="navigate('dashboard')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-chart-pie w-6 text-slate-400 group-hover:text-amber-500"></i> Dashboard
                    </a>
                    <a href="#" onclick="navigate('profits')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-hand-holding-dollar w-6 text-slate-400 group-hover:text-amber-500"></i> Ganancias
                    </a>
                    <a href="#" onclick="navigate('pos')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-cash-register w-6 text-slate-400 group-hover:text-amber-500"></i> Caja / Ventas
                    </a>
                    <a href="#" onclick="navigate('products')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-box-open w-6 text-slate-400 group-hover:text-amber-500"></i> Productos
                    </a>
                    <a href="#" onclick="navigate('inventory')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-boxes w-6 text-slate-400 group-hover:text-amber-500"></i> Inventario
                    </a>
                    <a href="#" onclick="navigate('clients')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-users w-6 text-slate-400 group-hover:text-amber-500"></i> Clientes / Fiados
                    </a>
                    <a href="#" onclick="navigate('suppliers')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-truck-loading w-6 text-slate-400 group-hover:text-amber-500"></i> Proveedores / Gastos
                    </a>
                    <a href="#" onclick="navigate('invoice-config')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-file-invoice w-6 text-slate-400 group-hover:text-amber-500"></i> Configurar factura
                    </a>
                    <a href="#" onclick="navigate('admin')" class="nav-item group flex items-center px-4 py-3 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-amber-500 transition-colors">
                        <i class="fas fa-cog w-6 text-slate-400 group-hover:text-amber-500"></i> Administración
                    </a>
                    <button id="exportarDatos" type="button" class="w-full mt-2 text-left group flex items-center px-4 py-3 text-sm font-medium rounded-md bg-slate-800/70 hover:bg-slate-800 hover:text-emerald-400 transition-colors">
                        <i class="fas fa-file-export w-6 text-emerald-400"></i> Exportar datos
                    </button>
                    <input type="file" id="importarArchivo" accept=".json" hidden>
                    <button id="importarDatos" type="button" class="w-full group flex items-center px-4 py-3 text-sm font-medium rounded-md bg-slate-800/70 hover:bg-slate-800 hover:text-amber-400 transition-colors">
                        <i class="fas fa-file-import w-6 text-amber-400"></i> Importar datos
                    </button>

                </nav>
            </div>
            <div class="p-4 border-t border-slate-800">
                <button onclick="logout()" class="w-full py-2 px-4 bg-red-900/50 hover:bg-red-800 text-red-200 rounded border border-red-800 text-sm transition flex items-center justify-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> Salir
                </button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-950 relative md:ml-0">
            <!-- HEADER -->
            <header class="bg-slate-900 shadow-md py-3 px-4 md:px-6 flex flex-wrap justify-between items-center gap-3 z-10 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <button id="mobile-menu-btn" class="md:hidden text-slate-200 hover:text-amber-500" aria-label="Abrir menú">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                <h2 id="page-title" class="text-lg md:text-xl font-bold text-white tracking-wide">Dashboard</h2>
                </div>
                <div class="flex items-center gap-2 md:gap-4 ml-auto">
                    <div id="caja-status" class="hidden sm:flex px-3 py-1 rounded-full text-xs font-bold bg-red-900/30 text-red-400 border border-red-800 items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-red-500"></span> CAJA CERRADA
                    </div>
                    <div class="text-xs sm:text-sm text-slate-400">
                        Usuario: <span id="current-username" class="font-bold text-amber-500">Admin</span>
                    </div>
                </div>
            </header>

            <!-- CONTENT AREA -->
            <div id="content-area" class="flex-1 overflow-auto p-4 md:p-6 relative">
                <!-- Vistas inyectadas dinámicamente aquí -->
            </div>
        </main>
    </div>

    <!-- NOTIFICATION TOAST -->
    <div id="toast" class="fixed bottom-5 right-5 bg-slate-800 text-white px-6 py-4 rounded-lg shadow-2xl border border-slate-700 transform translate-y-32 transition-transform duration-300 z-50 flex items-center gap-3">
        <i class="fas fa-info-circle text-amber-500"></i>
        <span id="toast-msg">Mensaje</span>
    </div>

    <!-- TICKET PRINT HIDDEN AREA -->
    <div id="ticket-print-area" class="hidden bg-white text-black p-4" style="width: 80mm; font-family: 'Courier New', monospace;">
        <!-- Ticket content gets generated here -->
    </div>

    <script>
        // --- ESTADO GLOBAL Y UTILIDADES ---
        const DB_KEY = 'newcloud_pos_db_v1';
        
        // Estructura inicial de datos con defaults para negocio general
        const initialData = {
            users: [{id: 1, name: 'Administrador', user: 'admin', pass: '1234', role: 'admin'}],
            categories: ['Categoría'],
            measures: ['Unidad'],
            products: [],
            clients: [{id: 1, name: 'Consumidor Final', cedula: '222222222', phone: '', address: '', credit: 0}],
            suppliers: [], // {id, name, nit, contact, phone}
            sales: [],
            openTickets: [],
            creditPayments: [], // {id, clientId, amount, date, user}
            expenses: [], // {id, date, desc, amount, supplierId, method, user}
            caja: { isOpen: false, openTime: null, openAmount: 0, salesSession: 0, creditPaymentSession: 0, expenseSession: 0, history: [] },
            currentUser: null,
            invoiceSettings: {
                businessName: 'Negocio',
                ownerName: '',
                phone: '',
                address: '',
                footer: 'Gracias por su compra'
            }
        };

        let db = JSON.parse(localStorage.getItem(DB_KEY));

        // Inicialización de DB si no existe o está vacía
        if (!db) {
            db = initialData;
            saveDB();
        }
        
        // Migraciones / Fixes de estructura
        if (!db.caja) db.caja = JSON.parse(JSON.stringify(initialData.caja));
        if (!db.caja.history) db.caja.history = [];
        if (db.caja.creditPaymentSession === undefined) db.caja.creditPaymentSession = 0;
        if (db.caja.expenseSession === undefined) db.caja.expenseSession = 0;
        if (!db.suppliers) db.suppliers = [];
        if (!db.expenses) db.expenses = [];
        if (!db.creditPayments) db.creditPayments = [];
        if (!Array.isArray(db.openTickets)) db.openTickets = [];
        if (!db.invoiceSettings) db.invoiceSettings = JSON.parse(JSON.stringify(initialData.invoiceSettings));
        db.products = (db.products || []).map((product) => {
            const baseSell = Number(product.sellPrice ?? product.sellPrices?.[0] ?? 0);
            const normalizedSellPrices = [0, 1, 2].map((idx) => {
                const val = product.sellPrices?.[idx];
                if (val === null || val === undefined || val === '') return idx === 0 ? baseSell : null;
                const parsed = Number(val);
                return Number.isFinite(parsed) ? parsed : (idx === 0 ? baseSell : null);
            });
            return {
                ...product,
                sellPrice: normalizedSellPrices[0],
                sellPrices: normalizedSellPrices
            };
        });
        // Asegurar categorías básicas del sistema si no hay nada
        if (db.categories.length === 0) db.categories = initialData.categories;
        if (db.measures.length === 0) db.measures = initialData.measures;
        
        saveDB();

        function saveDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-msg');
            msgEl.innerText = msg;
            toast.className = `fixed bottom-5 right-5 px-6 py-4 rounded-lg shadow-2xl border transform transition-transform duration-300 z-50 flex items-center gap-3 ${type === 'error' ? 'bg-red-900/90 border-red-700 text-white' : 'bg-slate-800 border-amber-500/50 text-white'}`;
            toast.classList.remove('translate-y-32');
            setTimeout(() => toast.classList.add('translate-y-32'), 3000);
        }

        // Intenta abrir la gaveta física de la caja si existe integración nativa.
        // Integraciones soportadas:
        // - window.CashDrawerBridge.open()
        // - window.electronAPI.openCashDrawer()
        // - window.openCashDrawer()
        function triggerCashDrawer(reason = 'sale') {
            try {
                if (window.CashDrawerBridge && typeof window.CashDrawerBridge.open === 'function') {
                    window.CashDrawerBridge.open({ reason });
                    return true;
                }
                if (window.electronAPI && typeof window.electronAPI.openCashDrawer === 'function') {
                    window.electronAPI.openCashDrawer(reason);
                    return true;
                }
                if (typeof window.openCashDrawer === 'function') {
                    window.openCashDrawer(reason);
                    return true;
                }
            } catch (error) {
                console.error('No se pudo abrir la caja registradora:', error);
            }
            return false;
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('es-CO', {
                style: 'currency',
                currency: 'COP',
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(amount || 0);
        }

        function formatQty(value) {
            return Number(value || 0).toLocaleString('es-CO', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 3
            });
        }

    function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        function normalizeText(value = '') {
            return value
                .toString()
                .toLowerCase()
                .normalize('NFD')
                .replace(/[\u0300-\u036f]/g, '');
        }
        // --- SISTEMA DE AUTENTICACIÓN ---
        const loginScreen = document.getElementById('login-screen');
        const appLayout = document.getElementById('app-layout');
        const loginForm = document.getElementById('login-form');
        const mobileSidebar = document.getElementById('mobile-sidebar');
        const mobileOverlay = document.getElementById('mobile-overlay');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileCloseBtn = document.getElementById('mobile-close-btn');

        function openMobileMenu() {
            if (window.innerWidth >= 768) return;
            mobileSidebar.classList.remove('-translate-x-full');
            mobileOverlay.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function closeMobileMenu() {
            if (window.innerWidth >= 768) return;
            mobileSidebar.classList.add('-translate-x-full');
            mobileOverlay.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        mobileMenuBtn.addEventListener('click', openMobileMenu);
        mobileCloseBtn.addEventListener('click', closeMobileMenu);
        mobileOverlay.addEventListener('click', closeMobileMenu);
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 768) {
                mobileOverlay.classList.add('hidden');
                mobileSidebar.classList.remove('-translate-x-full');
                document.body.classList.remove('overflow-hidden');
            } else if (!mobileOverlay.classList.contains('hidden')) {
                mobileSidebar.classList.remove('-translate-x-full');
            } else {
                mobileSidebar.classList.add('-translate-x-full');
            }
        });

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            const foundUser = db.users.find(u => u.user === user && u.pass === pass);
            
            if (foundUser) {
                db.currentUser = foundUser;
                document.getElementById('current-username').innerText = foundUser.name;
                document.getElementById('user-role-display').innerText = foundUser.role.toUpperCase();
                loginScreen.classList.add('hidden');
                appLayout.classList.remove('hidden');
                updateCajaStatus();
                navigate('dashboard');
            } else {
                showToast('Credenciales incorrectas', 'error');
            }
        });

        function logout() {
            closeMobileMenu();
            db.currentUser = null;
            location.reload();
        }

        // --- NAVEGACIÓN ---
        function navigate(view) {
            closeMobileMenu();
            const content = document.getElementById('content-area');
            const title = document.getElementById('page-title');
            content.innerHTML = '';
            
            // Highlight nav items
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('bg-slate-800', 'text-amber-500');
                el.classList.add('text-slate-300');
            });
            // (Simple highlighting logic based on onclick string match would go here if needed)

            switch(view) {
                case 'dashboard':
                    title.innerText = 'Panel Principal';
                    renderDashboard(content);
                    break;
                case 'profits':
                    title.innerText = 'Reporte de Ganancias & Rentabilidad';
                    renderProfits(content);
                    break;
                case 'products':
                    title.innerText = 'Bodega';
                    renderProducts(content);
                    break;
                case 'pos':
                    title.innerText = 'Punto de Venta (Caja)';
                    renderPOS(content);
                    break;
                case 'inventory':
                    title.innerText = 'Inventario & Kardex';
                    renderInventory(content);
                    break;
                case 'clients':
                    title.innerText = 'Clientes & Cuentas por Cobrar';
                    renderClients(content);
                    break;
                case 'suppliers':
                    title.innerText = 'Proveedores & Gastos';
                    renderSuppliers(content);
                    break;
                case 'invoice-config':
                    title.innerText = 'Configurar factura';
                    renderInvoiceConfig(content);
                    break;
                case 'admin':
                    title.innerText = 'Configuración';
                    renderAdmin(content);
                    break;
            }
        }

        // --- VISTA DASHBOARD ---
        function renderDashboard(container) {
            const salesInRange = getSalesInRange(currentProfitRange);
            const expensesInRange = getExpensesInRange(currentProfitRange);
            const periodTitle = getRangeTitle(currentProfitRange);
            const totalVentas = salesInRange.reduce((acc, s) => acc + (Number(s.total) || 0), 0);
            const totalGastos = expensesInRange.reduce((acc, e) => acc + (Number(e.amount) || 0), 0);
            const profit = totalVentas - totalGastos;
            const lowStock = db.products.filter(p => p.stock <= 5).length;

            container.innerHTML = `
                <div class="bg-slate-900 border border-slate-700 rounded-xl p-4 mb-6 flex flex-wrap items-center justify-between gap-3">
                    <h3 class="text-sm text-slate-300 font-semibold uppercase tracking-wide">Resumen del Dashboard: ${periodTitle}</h3>
                    <div class="flex gap-2">
                        <button onclick="currentProfitRange='today'; renderDashboard(document.getElementById('content-area'))"
                            class="px-4 py-2 rounded-full text-sm font-bold transition ${currentProfitRange === 'today' ? 'bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">Hoy</button>
                        <button onclick="currentProfitRange='week'; renderDashboard(document.getElementById('content-area'))"
                            class="px-4 py-2 rounded-full text-sm font-bold transition ${currentProfitRange === 'week' ? 'bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">Semana</button>
                        <button onclick="currentProfitRange='month'; renderDashboard(document.getElementById('content-area'))"
                            class="px-4 py-2 rounded-full text-sm font-bold transition ${currentProfitRange === 'month' ? 'bg-amber-500 text-slate-900' : 'bg-slate-700 text-slate-300'}">Mes</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-slate-400 text-sm font-bold uppercase">Ventas ${periodTitle}</h3>
                            <div class="p-2 bg-emerald-500/20 rounded-lg text-emerald-500"><i class="fas fa-coins text-xl"></i></div>
                        </div>
                        <p class="text-3xl font-bold text-white">${formatMoney(totalVentas)}</p>
                        <p class="text-xs text-emerald-400 mt-2"><i class="fas fa-arrow-up"></i> Ingresos brutos</p>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-slate-400 text-sm font-bold uppercase">Gastos ${periodTitle}</h3>
                            <div class="p-2 bg-red-500/20 rounded-lg text-red-500"><i class="fas fa-file-invoice-dollar text-xl"></i></div>
                        </div>
                        <p class="text-3xl font-bold text-white">${formatMoney(totalGastos)}</p>
                        <p class="text-xs text-red-400 mt-2"><i class="fas fa-arrow-down"></i> Salidas de dinero</p>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-slate-400 text-sm font-bold uppercase">Balance Neto</h3>
                            <div class="p-2 bg-amber-500/20 rounded-lg text-amber-500"><i class="fas fa-balance-scale text-xl"></i></div>
                        </div>
                        <p class="text-3xl font-bold text-white">${formatMoney(profit)}</p>
                        <p class="text-xs text-amber-400 mt-2">Ventas - Gastos</p>
                    </div>

                    <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-lg">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-slate-400 text-sm font-bold uppercase">Stock Crítico</h3>
                            <div class="p-2 bg-orange-500/20 rounded-lg text-orange-500"><i class="fas fa-exclamation-triangle text-xl"></i></div>
                        </div>
                        <p class="text-3xl font-bold text-white">${lowStock}</p>
                        <p class="text-xs text-orange-400 mt-2">Productos por agotarse</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                     <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 p-6">
                        <div class="flex flex-wrap justify-between items-center mb-4 border-b border-slate-700 pb-2 gap-2">
                            <h3 class="text-lg font-bold text-white">Detalle de Ventas (${periodTitle})</h3>

        function renderProductCodeSearchResults(query = '') {
            const resultsEl = document.getElementById('product-code-search-results');
            if (!resultsEl) return;

            const normalizedQuery = normalizeText(query.trim());
            if (!normalizedQuery) {
                resultsEl.innerHTML = '<p class="text-slate-500">Escribe un código para buscar productos creados.</p>';
                return;
            }

            const matches = db.products
                .filter((p) => normalizeText((p.code || '').trim()).includes(normalizedQuery))
                .slice(0, 12);

            if (!matches.length) {
                resultsEl.innerHTML = '<p class="text-slate-500">No se encontraron productos con ese código.</p>';
                return;
            }

            resultsEl.innerHTML = matches.map((p) => `
                <button type="button" onclick="editProduct('${p.id}')" class="w-full text-left bg-slate-900 border border-slate-700 rounded p-2 hover:border-amber-500 transition">
                    <div class="font-semibold text-slate-200">${p.name}</div>
                    <div class="text-slate-500 font-mono">${p.code}</div>
                </button>
            `).join('');

        function editProduct(id) {
            const product = db.products.find(p => p.id === id);

            document.getElementById('prod-name').value = product.name;
            document.getElementById('prod-code').value = product.code;
            document.getElementById('prod-brand').value = product.brand;
            document.getElementById('prod-cat').value = product.category;
            document.getElementById('prod-measure').value = product.measure;
            document.getElementById('prod-buy').value = product.buyPrice;
            document.getElementById('prod-sell-1').value = product.sellPrices?.[0] ?? product.sellPrice ?? '';
            document.getElementById('prod-sell-2').value = product.sellPrices?.[1] ?? '';
            document.getElementById('prod-sell-3').value = product.sellPrices?.[2] ?? '';

            productEditing = id;

                activeTicketId = db.openTickets[0].id;
            }
            const activeTicket = db.openTickets.find((ticket) => ticket.id === activeTicketId);
            currentCart = Array.isArray(activeTicket?.cart) ? activeTicket.cart : [];
        }

        function persistActiveTicketCart() {
            const activeTicket = db.openTickets.find((ticket) => ticket.id === activeTicketId);
            if (activeTicket) activeTicket.cart = currentCart;

            ensureOpenTickets();

            const newTicket = {

                name: `Ticket ${db.openTickets.length + 1}`,
                cart: []

            currentCart = newTicket.cart;

            renderPOS(document.getElementById('content-area'));

        function switchSaleTicket(ticketId) {
            ensureOpenTickets();
            persistActiveTicketCart();

            activeTicketId = ticketId;
            currentCart = nextTicket.cart || [];
            saveDB();
            updateCartUI();
        }

            ensureOpenTickets();

            db.openTickets = db.openTickets.filter((ticket) => ticket.id !== ticketId);

                activeTicketId = db.openTickets[0].id;
                currentCart = db.openTickets[0].cart || [];

        function setPosFilter(cat) {
            posCategoryFilter = cat;
            // Update UI visual state
            const btns = document.querySelectorAll('#pos-category-filters button');
            btns.forEach(b => {
                if(b.innerText === cat) {
                    b.classList.remove('bg-slate-800', 'text-slate-300', 'border-slate-700');
                    b.classList.add('bg-amber-500', 'text-slate-900', 'border-transparent');

                    b.classList.add('bg-slate-800', 'text-slate-300', 'border-slate-700');
                    b.classList.remove('bg-amber-500', 'text-slate-900', 'border-transparent');

            });
            searchPOS(document.getElementById('pos-search').value);

       function searchPOS(query) {
            const list = document.getElementById('pos-product-list');
            if(!list) return;

            const normalizedQuery = normalizeText(query.trim());
            const isCodeSearch = normalizedQuery.length >= 3 && /\d/.test(normalizedQuery);
            const onlyCategoryFilter = posCategoryFilter !== 'Todos';

            if (!normalizedQuery && !onlyCategoryFilter && db.products.length > POS_MAX_RENDER_ITEMS) {
                list.innerHTML = `<div class="col-span-full text-center text-slate-600 mt-10">
                    <i class="fas fa-filter mb-2 text-2xl"></i><br>
                    Escribe al menos ${POS_MIN_CHARS_FOR_FULL_LIST} letras para buscar productos.
                </div>`;
                return;
            }
            
            let matches = posSearchIndex.filter((item) => {
                if (posCategoryFilter !== 'Todos' && item.product.category !== posCategoryFilter) return false;
                if (!normalizedQuery) return true;

                return (
                    item.normalizedName.includes(normalizedQuery) ||
                    item.normalizedCode.includes(normalizedQuery) ||
                    item.normalizedBrand.includes(normalizedQuery)
                );
            });

            if (normalizedQuery) {
                matches.sort((a, b) => {
                    const aCodeStarts = a.normalizedCode.startsWith(normalizedQuery) ? 1 : 0;
                    const bCodeStarts = b.normalizedCode.startsWith(normalizedQuery) ? 1 : 0;
                    if (aCodeStarts !== bCodeStarts) return bCodeStarts - aCodeStarts;

                    const aNameStarts = a.normalizedName.startsWith(normalizedQuery) ? 1 : 0;
                    const bNameStarts = b.normalizedName.startsWith(normalizedQuery) ? 1 : 0;
                    if (aNameStarts !== bNameStarts) return bNameStarts - aNameStarts;

                    if (isCodeSearch) return a.product.name.localeCompare(b.product.name);
                    return a.product.name.localeCompare(b.product.name);
                });
            }

            const totalMatches = matches.length;
            const visibleProducts = matches.slice(0, POS_MAX_RENDER_ITEMS).map(item => item.product);

            if(totalMatches === 0) {
                list.innerHTML = `<div class="col-span-full text-center text-slate-600 mt-10">
                    <i class="fas fa-search mb-2 text-2xl"></i><br>
                    No se encontraron productos.
                </div>`;
                return;
            }

            const cappedInfo = totalMatches > POS_MAX_RENDER_ITEMS
                ? `<div class="col-span-full text-[11px] text-slate-500 bg-slate-900/60 border border-slate-700 rounded p-2">
                    Mostrando ${POS_MAX_RENDER_ITEMS} de ${totalMatches} resultados. Escribe más letras para filtrar más rápido.
                </div>`
                : '';

            list.innerHTML = `${cappedInfo}${visibleProducts.map(p => `
    <div class="bg-slate-800 border border-slate-700 p-3 rounded-xl cursor-pointer hover:border-amber-500 hover:shadow-lg hover:shadow-amber-900/20 transition group flex flex-col justify-between h-[120px] relative overflow-hidden" onclick="addToCart('${p.id}')">
        <div class="absolute top-0 right-0 bg-slate-700 text-slate-300 text-[9px] px-1.5 py-0.5 rounded-bl-lg z-10 font-mono">
            ${p.measure}
        </div>
        
        <div class="flex-1">
            <h4 class="font-bold text-xs text-slate-200 leading-tight mb-1 group-hover:text-amber-500 transition-colors line-clamp-2 overflow-hidden" title="${p.name}">
                ${p.name.toUpperCase()}
            </h4>
            <p class="text-[9px] text-slate-500 uppercase tracking-tighter">${p.category}</p>
        </div>

        <div class="mt-2 flex justify-between items-end">
            <div class="flex flex-col">
                <span class="text-amber-500 font-bold text-base leading-none">${formatMoney(p.sellPrices?.[0] ?? p.sellPrice)}</span>
                <span class="text-[9px] text-slate-500">P2: ${p.sellPrices?.[1] ? formatMoney(p.sellPrices[1]) : '-'} · P3: ${p.sellPrices?.[2] ? formatMoney(p.sellPrices[2]) : '-'}</span>
            </div>
            <span class="text-[9px] ${p.stock < 5 ? 'bg-red-900 text-red-400' : 'bg-slate-900 text-slate-400'} px-1.5 py-0.5 rounded border border-slate-700">
                Stock: ${p.stock}
             </span>
        </div>
    </div>
`).join('')}`;
        }

        function getCartQtyForProduct(prodId, ignoreCartIndex = null) {
            return currentCart.reduce((acc, item, idx) => {
                if (item.id !== prodId) return acc;
                if (ignoreCartIndex !== null && idx === ignoreCartIndex) return acc;
                return acc + (Number(item.qty) || 0);
            }, 0);
        }

        function getAvailableStock(prodId, ignoreCartIndex = null) {
            const prod = posProductLookup.get(prodId) || db.products.find(p => String(p.id) === String(prodId));
            if (!prod) return 0;
            const stock = Number(prod.stock) || 0;
            const reserved = getCartQtyForProduct(prodId, ignoreCartIndex);
            return Number((stock - reserved).toFixed(0));
        }

        function addToCart(prodId) {
            const prod = posProductLookup.get(prodId);
            if (!prod) return;
            const existing = currentCart.find(i => i.id === prodId);
            const productPrices = [
                prod.sellPrices?.[0] ?? prod.sellPrice,
                prod.sellPrices?.[1] ?? null,
                prod.sellPrices?.[2] ?? null
            ];
            
            if(existing) {
                existing.qty = Number((existing.qty + existing.qtyStep).toFixed(0));
            } else {
                currentCart.push({
                    id: prod.id,
                    name: prod.name,
                    price: productPrices[0],
                    qty: 1,
                    qtyStep: 1,
                    originalPrice: productPrices[0],
                    measure: prod.measure,
                    priceOptions: productPrices,
                    selectedPriceIndex: 0
                });
            }
            updateCartUI();
        }

        function updateCartUI() {
            const cartContainer = document.getElementById('pos-cart-items');
            const totalEl = document.getElementById('pos-total');
            const subtotalEl = document.getElementById('pos-subtotal');
            
            if(currentCart.length === 0) {
                cartContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-slate-600 opacity-50">
                        <i class="fas fa-shopping-basket text-4xl mb-2"></i>

                    </div>`;
                if(totalEl) totalEl.innerText = formatMoney(0);
                if(subtotalEl) subtotalEl.innerText = formatMoney(0);
                return;
            }

            cartContainer.innerHTML = currentCart.map((item, idx) => `
                <div class="bg-slate-700/50 p-2 rounded-lg border border-slate-700 flex flex-col gap-2 relative group">
                    <div class="flex justify-between items-start">
                        <span class="font-bold text-slate-200 text-sm truncate w-32 leading-tight">${item.name}</span>
                        <button onclick="removeFromCart(${idx})" class="text-slate-500 hover:text-red-400 transition"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="flex items-center justify-between text-xs">
                        <div class="flex items-center bg-slate-900 rounded border border-slate-600">
                            <button onclick="updateItemQty(${idx}, ${item.qty - item.qtyStep})" class="px-2 py-1 hover:bg-slate-700 text-slate-400">-</button>
                            <input type="number" step="${item.qtyStep || 1}"
                                value="${item.qty}" 
                                onchange="updateItemQty(${idx}, this.value)" 
                                class="w-10 p-1 bg-transparent text-center font-bold text-white border-none focus:ring-0 outline-none appearance-none m-0">
                            <button onclick="updateItemQty(${idx}, ${item.qty + item.qtyStep})" class="px-2 py-1 hover:bg-slate-700 text-slate-400">+</button>
                        </div>
                        <div class="font-bold text-amber-500">
                            ${formatMoney(item.qty * item.price)}
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-slate-400">Precio</label>
                        <select onchange="changeCartItemPrice(${idx}, this.value)" class="w-full mt-1 bg-slate-900 border border-slate-600 rounded px-2 py-1 text-xs text-white">
                            ${(item.priceOptions || [item.price]).map((priceOption, priceIdx) => `
                                <option value="${priceIdx}" ${item.selectedPriceIndex === priceIdx ? 'selected' : ''} ${priceOption ? '' : 'disabled'}>
                                    Precio ${priceIdx + 1}: ${priceOption ? formatMoney(priceOption) : 'No definido'}
                                </option>
                            `).join('')}
                        </select>
                    </div>
                </div>
            `).join('');

            const total = currentCart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            if(totalEl) totalEl.innerText = formatMoney(total);
            if(subtotalEl) subtotalEl.innerText = formatMoney(total);
            persistActiveTicketCart();
            saveDB();
        }

        function updateItemQty(idx, val) {
            const item = currentCart[idx];
            if (!item) return;
            let newVal = parseInt(val);
            if (!Number.isFinite(newVal) || newVal <= 0) {
                removeFromCart(idx);
                return;
            }
            newVal = Number(newVal.toFixed(0));
            const available = getAvailableStock(item.id, idx);
            if (newVal > available) {
                showToast(`No hay stock suficiente para ${item.name}. Disponible: ${formatQty(Math.max(available, 0))}`, 'error');
                newVal = Math.max(available, 0);
            }
            if (newVal <= 0) {
                removeFromCart(idx);
                return;
            }
            currentCart[idx].qty = newVal;
            updateCartUI();
        }
        function removeFromCart(idx) {
            currentCart.splice(idx, 1);
            updateCartUI();
        }
        function changeCartItemPrice(idx, selectedIndex) {
            const item = currentCart[idx];
            if (!item) return;
            const newPrice = item.priceOptions?.[Number(selectedIndex)];
            if (!newPrice) return;
            item.selectedPriceIndex = Number(selectedIndex);
            item.price = Number(newPrice);
            updateCartUI();
        }
        function clearCart() {
            currentCart = [];
            persistActiveTicketCart();
            updateCartUI();
        }

            const modalHTML = `

        function toggleCheckoutFields() {
            const methodEl = document.getElementById('pay-method');
            const payAmountEl = document.getElementById('pay-amount');
            const clientWrap = document.getElementById('credit-client-wrap');
            if(!methodEl || !payAmountEl || !clientWrap) return;
            const isCredit = methodEl.value === 'Credito';
            clientWrap.classList.toggle('hidden', !isCredit);
            payAmountEl.disabled = isCredit;
            payAmountEl.classList.toggle('opacity-60', isCredit);
            payAmountEl.classList.toggle('cursor-not-allowed', isCredit);
            if (isCredit) payAmountEl.value = 0;
            else if ((parseInt(payAmountEl.value) || 0) === 0) {
                const subtotal = currentCart.reduce((acc, item) => acc + (item.qty * item.price), 0);
                const discount = parseInt(document.getElementById('pay-discount')?.value) || 0;
                payAmountEl.value = Math.max(subtotal - discount, 0);
            }
            calcChange();
        }

        function calcChange() {
            const rawTotal = currentCart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            const discount = parseInt(document.getElementById('pay-discount').value) || 0;
            const finalTotal = rawTotal - discount;
            const method = document.getElementById('pay-method')?.value;
            const payAmount = method === 'Credito' ? 0 : (parseInt(document.getElementById('pay-amount').value) || 0);
            
            document.getElementById('pay-final-total').innerText = formatMoney(finalTotal);
            const change = payAmount - finalTotal;
            const changeEl = document.getElementById('pay-change');
            
            changeEl.innerText = formatMoney(change);
            changeEl.className = change >= 0 ? "font-bold text-emerald-400 text-xl" : "font-bold text-red-400 text-xl";
        }

         function processSale() {
            const method = document.getElementById('pay-method').value;
            const clientId = document.getElementById('pay-client')?.value || null;
            const discount = parseInt(document.getElementById('pay-discount').value) || 0;
            const payAmount = parseInt(document.getElementById('pay-amount').value) || 0;
            
            const rawTotal = currentCart.reduce((acc, item) => acc + (item.qty * item.price), 0);
            const total = rawTotal - discount;
            const change = payAmount - total;

            const missingProduct = currentCart.find((item) => !db.products.find(prod => String(prod.id) === String(item.id)));
            if (missingProduct) {
                showToast('No se pudo procesar la venta: hay productos que ya no existen.', 'error');
                navigate('pos');
                return;
            }

            if(method === 'Efectivo' && payAmount < total) return alert("Pago insuficiente");
            if(method === 'Credito') {
                if(!clientId) return alert("Selecciona un cliente para registrar el crédito.");
            }

            // Descontar inventario
            currentCart.forEach(item => {
                const p = db.products.find(prod => prod.id === item.id);
                if(p) p.stock -= item.qty;
            });

            const sale = {
                id: generateId(),
                date: new Date(),
                items: [...currentCart],
                total: total,
                method: method,
                clientId: method === 'Credito' ? clientId : null,
                discount: discount,
                payAmount: method === 'Credito' ? 0 : payAmount,
                paidAmount: method === 'Credito' ? 0 : total,
                change: method === 'Credito' ? 0 : change,
                user: db.currentUser.user
            };
            sale.invoiceHtml = buildInvoiceHtml(sale);

            // Manejo de dinero y deudas
            if (method === 'Efectivo') {
                db.caja.salesSession += total;
            } else if (method === 'Credito') {
                const client = db.clients.find(c => String(c.id) === String(clientId));
                if(client) {
                    client.credit = (Number(client.credit) || 0) + total;
                }
            }

            db.sales.push(sale);
            db.openTickets = db.openTickets.map((ticket) => ticket.id === activeTicketId ? { ...ticket, cart: [] } : ticket);
            currentCart = [];
            saveDB();

            // Abrir gaveta para cobros en efectivo (si hay integración de hardware).
            if (method === 'Efectivo') {
                const opened = triggerCashDrawer('sale');
                if (!opened) {
                    console.info('Sin integración de gaveta: define window.CashDrawerBridge.open / electronAPI.openCashDrawer / window.openCashDrawer');
                }
            }
            
            document.getElementById('checkout-modal').remove();
            printTicket(sale);
            navigate('pos');
            showToast('Venta Registrada Exitosamente');
        }

                    nit: document.getElementById('sup-nit').value,
                    contact: document.getElementById('sup-contact').value,
                    phone: document.getElementById('sup-phone').value
                });
                saveDB();
                renderSuppliers(container);
                showToast('Proveedor agregado');
            });

            const expenseType = document.getElementById('exp-type');
            if (expenseType) {
                expenseType.addEventListener('change', () => togglePurchaseFields(expenseType.value === 'purchase'));
            }
            togglePurchaseFields(false);

            document.getElementById('expense-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const amount = parseInt(document.getElementById('exp-amount').value);
                const method = document.getElementById('exp-method').value;
                const type = document.getElementById('exp-type').value;
                const purchaseItems = type === 'purchase' ? readPurchaseItemsFromForm() : [];

                if (!amount || amount <= 0) {
                    showToast('Ingresa un valor válido para el egreso', 'error');
                    return;
                }
                if (type === 'purchase' && purchaseItems.length === 0) {
                    showToast('Agrega al menos un producto en la factura de compra', 'error');
                    return;
                }

                if(method === 'Efectivo') {
                    if(!db.caja.isOpen) return showToast('La caja está cerrada, no puede sacar efectivo', 'error');
                    const currentCash = db.caja.openAmount + db.caja.salesSession + db.caja.creditPaymentSession - db.caja.expenseSession;
                    if(amount > currentCash) alert("ADVERTENCIA: El monto supera el efectivo calculado en caja.");
                    db.caja.expenseSession += amount;
                }

                if (type === 'purchase') {
                    purchaseItems.forEach((item) => {
                        const product = db.products.find((p) => p.id === item.productId);
                        if (product) {
                            product.stock = Number(product.stock || 0) + item.qty;
                            if (item.unitCost > 0) product.buyPrice = item.unitCost;
                        }
                    });
                }

                db.expenses.push({
                    id: generateId(),
                    date: new Date(),
                    desc: document.getElementById('exp-desc').value,
                    amount: amount,
                    supplierId: document.getElementById('exp-supplier').value,
                    method: method,
                    user: db.currentUser.user,
                    type,
                    invoiceNumber: document.getElementById('exp-invoice-number')?.value || '',
                    invoiceDate: document.getElementById('exp-invoice-date')?.value || '',
                    items: purchaseItems
                });
                
                saveDB();
                refreshPOSSearchIndex();
                renderSuppliers(container);
                showToast(type === 'purchase' ? 'Factura registrada y stock actualizado' : 'Gasto registrado correctamente');
            });
        }

        function deleteSupplier(id) {
            if(confirm('¿Borrar proveedor?')) {
                db.suppliers = db.suppliers.filter(s => s.id !== id);
                saveDB();
                renderSuppliers(document.getElementById('content-area'));
            }
        }

        function togglePurchaseFields(show) {
            const purchaseExtra = document.getElementById('purchase-extra');
            if (!purchaseExtra) return;
            purchaseExtra.classList.toggle('hidden', !show);
            if (show) {
                if (!document.getElementById('purchase-items')?.children.length) addPurchaseItemRow();
                if (document.getElementById('exp-invoice-date') && !document.getElementById('exp-invoice-date').value) {
                    document.getElementById('exp-invoice-date').value = new Date().toISOString().slice(0, 10);
                }
            }
        }

        function renderPurchaseProductOptions(selectEl, query = '') {
            if (!selectEl) return;
            const normalizedQuery = normalizeText((query || '').trim());
            const filteredProducts = db.products.filter((product) => {
                if (!normalizedQuery) return true;
                const searchable = `${product.code || ''} ${product.name || ''}`;
                return normalizeText(searchable).includes(normalizedQuery);
            });

            selectEl.innerHTML = `
                <option value="">Selecciona producto</option>
                ${filteredProducts.map((p) => `<option value="${p.id}">${p.code || 'SIN-CODIGO'} · ${p.name}</option>`).join('')}
            `;
        }

        function addPurchaseItemRow() {
            const purchaseItemsEl = document.getElementById('purchase-items');
            if (!purchaseItemsEl) return;
            const row = document.createElement('div');
            row.className = 'grid grid-cols-12 gap-2 items-end purchase-row';
            row.innerHTML = `
                <div class="col-span-6">
                    <label class="text-[10px] text-slate-500">Producto</label>
                    <input type="text" class="purchase-product-search w-full rounded p-2 text-xs mb-1" placeholder="Buscar por código o nombre">
                    <select class="purchase-product w-full rounded p-2 text-xs"></select>
                </div>
                <div class="col-span-2">
                    <label class="text-[10px] text-slate-500">Cant.</label>
                    <input type="number" min="1" step="1" class="purchase-qty w-full rounded p-2 text-xs" placeholder="0">
                </div>
                <div class="col-span-3">
                    <label class="text-[10px] text-slate-500">Costo unit.</label>
                    <input type="number" min="0" step="1" class="purchase-unit-cost w-full rounded p-2 text-xs" placeholder="0">
                </div>
                <div class="col-span-1">
                    <button type="button" onclick="removePurchaseItemRow(this)" class="w-full bg-red-900/30 text-red-400 rounded p-2 border border-red-800 hover:bg-red-900/50">
                        <i class="fas fa-trash text-xs"></i>
                    </button>
                </div>
            `;
            purchaseItemsEl.appendChild(row);

            const searchInput = row.querySelector('.purchase-product-search');
            const productSelect = row.querySelector('.purchase-product');
            renderPurchaseProductOptions(productSelect, '');

            if (searchInput) {
                searchInput.addEventListener('input', () => {
                    const currentValue = productSelect?.value || '';
                    renderPurchaseProductOptions(productSelect, searchInput.value);
                    if (currentValue) productSelect.value = currentValue;
                });
            }
        }

        function removePurchaseItemRow(btn) {
            const row = btn.closest('.purchase-row');
            if (!row) return;
            row.remove();
            const purchaseItemsEl = document.getElementById('purchase-items');
            if (purchaseItemsEl && purchaseItemsEl.children.length === 0) addPurchaseItemRow();
        }

        function readPurchaseItemsFromForm() {
            const rows = Array.from(document.querySelectorAll('#purchase-items .purchase-row'));
            return rows.map((row) => {
                const productId = row.querySelector('.purchase-product')?.value;
                const qty = parseInt(row.querySelector('.purchase-qty')?.value || '0');
                const unitCost = parseInt(row.querySelector('.purchase-unit-cost')?.value || '0');
                return {
                    productId,
                    qty,
                    unitCost
                };
            }).filter(item => item.productId && item.qty > 0);
        }

       function closeCaja() {
    if (!db.caja.isOpen) {
        showToast('La caja ya está cerrada', 'error');
        return;
    }

    if (!confirm('¿Seguro que deseas cerrar la caja?')) return;

    const cierre = {
        openTime: db.caja.openTime,
        closeTime: new Date(),
        openAmount: db.caja.openAmount,
        sales: db.caja.salesSession,
        creditPayments: db.caja.creditPaymentSession || 0,
        expenses: db.caja.expenseSession,
        user: db.currentUser?.name || 'Sistema'
    };

    const totalEsperado =
        cierre.openAmount +
        cierre.sales -
        cierre.expenses +
        cierre.creditPayments;
    const fechaCierre = new Date(cierre.closeTime);
    const ventasDelDia = (db.sales || [])
        .filter(sale => new Date(sale.date).toDateString() === fechaCierre.toDateString())
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    const egresosDelDia = (db.expenses || [])
        .filter(expense => new Date(expense.date).toDateString() === fechaCierre.toDateString())
        .sort((a, b) => new Date(a.date) - new Date(b.date));
    const abonosDelDia = (db.creditPayments || [])
        .filter(payment => new Date(payment.date).toDateString() === fechaCierre.toDateString())
        .sort((a, b) => new Date(a.date) - new Date(b.date));

    /* ================= PDF ================= */
    const doc = new jspdf.jsPDF();

    doc.setFontSize(16);
    doc.text('CIERRE DE CAJA - ESTANCO POS', 105, 15, null, null, 'center');

    doc.setFontSize(10);
    doc.text(`Fecha cierre: ${new Date().toLocaleString()}`, 10, 30);
    doc.text(`Usuario: ${cierre.user}`, 10, 36);

    doc.line(10, 40, 200, 40);

    const rows = [
        ['Base inicial', formatMoney(cierre.openAmount)],
        ['Ventas', formatMoney(cierre.sales)],
        ['Abonos (créditos)', formatMoney(cierre.creditPayments)],
        ['Gastos en efectivo', `-${formatMoney(cierre.expenses)}`],
        ['----------------', '------------'],
        ['TOTAL ESPERADO EN CAJA', formatMoney(totalEsperado)]
    ];

    doc.autoTable({
        startY: 45,
        head: [['Concepto', 'Valor']],
        body: rows,
        styles: { fontSize: 11 },
        columnStyles: {
            1: { halign: 'right', fontStyle: 'bold' }
        }
    });

    doc.text('Detalle de ventas del día', 10, doc.lastAutoTable.finalY + 12);

    const ventasRows = ventasDelDia.length
        ? ventasDelDia.map((sale, idx) => ([
            idx + 1,
            new Date(sale.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            sale.method || 'N/A',
            formatMoney(sale.total),
            formatMoney(sale.discount || 0),
            (sale.items || []).map(item => `${formatQty(item.qty)} x ${item.name} @ ${formatMoney(item.price)}`).join(' | ') || 'Sin detalle'
        ]))
        : [['-', '-', 'Sin ventas registradas', formatMoney(0), formatMoney(0), 'Sin detalle']];

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 16,
        head: [['#', 'Hora', 'Método', 'Total', 'Descuento', 'Productos']],
        body: ventasRows,
        styles: { fontSize: 9 },
        columnStyles: {
            0: { halign: 'center', cellWidth: 12 },
            3: { halign: 'right', fontStyle: 'bold', cellWidth: 24 },
            4: { halign: 'right', cellWidth: 24 },
            5: { cellWidth: 80 }
        }
    });

    doc.text('Detalle de egresos del día', 10, doc.lastAutoTable.finalY + 12);
    const egresosRows = egresosDelDia.length
        ? egresosDelDia.map((expense, idx) => ([
            idx + 1,
            new Date(expense.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            expense.desc || 'Egreso',
            `-${formatMoney(expense.amount)}`
        ]))
        : [['-', '-', 'Sin egresos registrados', formatMoney(0)]];

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 16,
        head: [['#', 'Hora', 'Detalle', 'Valor']],
        body: egresosRows,
        styles: { fontSize: 9 },
        columnStyles: {
            0: { halign: 'center', cellWidth: 12 },
            3: { halign: 'right', fontStyle: 'bold' }
        }
    });

    doc.text('Detalle de abonos del día', 10, doc.lastAutoTable.finalY + 12);
    const abonosRows = abonosDelDia.length
        ? abonosDelDia.map((payment, idx) => {
            const client = db.clients.find(c => String(c.id) === String(payment.clientId));
            return [
                idx + 1,
                new Date(payment.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                client?.name || 'Cliente',
                formatMoney(payment.amount)
            ];
        })
        : [['-', '-', 'Sin abonos registrados', formatMoney(0)]];

    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 16,
        head: [['#', 'Hora', 'Cliente', 'Valor']],
        body: abonosRows,
        styles: { fontSize: 9 },
        columnStyles: {
            0: { halign: 'center', cellWidth: 12 },
            3: { halign: 'right', fontStyle: 'bold' }
        }
    });

    const salesTotalsByMethod = ventasDelDia.reduce((acc, sale) => {
        const method = sale.method || 'N/A';
        acc[method] = (acc[method] || 0) + (Number(sale.total) || 0);
        return acc;
    }, {});
    const totalesMetodoRows = Object.entries(salesTotalsByMethod).map(([method, value]) => [method, formatMoney(value)]);
    totalesMetodoRows.push(['Abonos recibidos', formatMoney(cierre.creditPayments)]);
    totalesMetodoRows.push(['Efectivo esperado final', formatMoney(totalEsperado)]);

    doc.text('Resumen por forma de pago', 10, doc.lastAutoTable.finalY + 12);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 16,
        head: [['Forma de pago', 'Valor']],
        body: totalesMetodoRows.length ? totalesMetodoRows : [['N/A', formatMoney(0)]],
        styles: { fontSize: 9 },
        columnStyles: {
            1: { halign: 'right', fontStyle: 'bold' }
        }
    });

    doc.text(
        'Documento generado automáticamente por el sistema',
        105,
        doc.lastAutoTable.finalY + 12,
        null,
        null,
        'center'
    );

    doc.save(`Cierre_Caja_${new Date().toISOString().slice(0,10)}.pdf`);

    /* ================= GUARDAR HISTORIAL ================= */
    db.caja.history.push({
        ...cierre,
        finalAmount: totalEsperado
    });

    /* ================= RESET TOTAL ================= */
    db.caja.isOpen = false;
    db.caja.openTime = null;
    db.caja.openAmount = 0;
    db.caja.salesSession = 0;
    db.caja.creditPaymentSession = 0;
    db.caja.expenseSession = 0;

    db.openTickets = [{ id: generateId(), name: 'Ticket 1', cart: [] }];
    activeTicketId = db.openTickets[0].id;
    currentCart = db.openTickets[0].cart;

    saveDB();
    updateCajaStatus();
    navigate('pos');
    showToast('Caja cerrada y PDF generado');
}


        function buildInvoiceHtml(sale) {
     const creditClient = sale.clientId ? db.clients.find(c => String(c.id) === String(sale.clientId)) : null;
     const pendingCredit = sale.method === 'Credito'
        ? Math.max((Number(sale.total) || 0) - (Number(sale.paidAmount) || 0), 0)
        : 0;
     const itemsHtml = sale.items.map(i => `
        <div style="font-size: 10px; margin-bottom: 4px;">
            <div style="display:flex; justify-content:space-between;">
                <span>${formatQty(i.qty)} x ${i.name.substring(0,18)}</span>
                <span>${formatMoney(i.qty * i.price)}</span>
            </div>
            <div style="display:flex; justify-content:space-between; color:#374151;">
                <span>Precio venta</span>
                <span>${formatMoney(i.price)}</span>
            </div>
        </div>
    `).join('');

    const subtotal = sale.items.reduce((acc, item) => acc + (item.qty * item.price), 0);

    const html = `
        <html>
        <head>
            <title>Factura</title>
            <style>
                body {
                    font-family: monospace;
                    width: 80mm;
                    margin: 0;
                    padding: 5px;
                }
            </style>
        </head>
        <body style="font-size:13px; line-height:1.4;">
            <div style="text-align:center; font-weight:700; font-size:15px;">
                ${db.invoiceSettings.businessName || 'Negocio'}<br>
                ${db.invoiceSettings.ownerName ? `<span style=\"font-size:12px; font-weight:600;\">${db.invoiceSettings.ownerName}</span><br>` : ''}
                ${db.invoiceSettings.phone ? `<span style=\"font-size:12px; font-weight:600;\">${db.invoiceSettings.phone}</span><br>` : ''}
                ${db.invoiceSettings.address ? `<span style=\"font-size:12px; font-weight:600;\">${db.invoiceSettings.address}</span>` : ''}
            </div>
            <hr>
            <b>Fecha:</b> ${new Date(sale.date).toLocaleString()}<br>
            <b>Ticket #:</b> ${sale.id.substr(-6)}<br>
            <hr>
            ${itemsHtml}
            <hr>
            <b>Subtotal:</b> ${formatMoney(subtotal)}<br>
            <b>Descuento:</b> ${formatMoney(sale.discount || 0)}<br>
            <b style="font-size:15px;">TOTAL: ${formatMoney(sale.total)}</b><br>
            <b>Pago:</b> ${sale.method}<br>
            ${creditClient ? `<b>Cliente:</b> ${creditClient.name}<br>` : ''}
            ${sale.method === 'Credito' ? `<b>Saldo pendiente:</b> ${formatMoney(pendingCredit)}<br>` : ''}
            <br>
            <b style="font-size:14px;">${db.invoiceSettings.footer || 'Gracias por su compra'}</b>
        </body>
        </html>
    `;
    return html;
}

        function printTicket(sale) {
    const html = sale.invoiceHtml || buildInvoiceHtml(sale);
    const printWindow = window.open('', '_blank', 'width=300,height=600');
    printWindow.document.write(html);
    printWindow.document.close();
    printWindow.focus();

    setTimeout(() => {
        printWindow.print();
        printWindow.close();
    }, 300);
}

        function updateStock(factor) {
            const prodId = document.getElementById('inv-prod').value;
            const qty = parseInt(document.getElementById('inv-qty').value);

            const prod = db.products.find(p => p.id === prodId);
            if(prod) {
                prod.stock += (qty * factor);
                saveDB();
                showToast('Stock actualizado correctamente');
                renderInventory(document.getElementById('content-area'));
            }
        }

        function deleteSale(saleId) {
            const sale = db.sales.find(s => String(s.id) === String(saleId));
            if (!sale) {
                showToast('No se encontró la venta a eliminar', 'error');
                return;
            }

            const paidAmount = Number(sale.paidAmount) || 0;
            if (sale.method === 'Credito' && paidAmount > 0) {
                showToast('No se puede eliminar un crédito con abonos aplicados', 'error');
                return;
            }

            if (!confirm('¿Seguro que deseas eliminar esta venta? Esta acción restaura stock y caja.')) return;

            sale.items.forEach((item) => {
                const product = db.products.find((p) => String(p.id) === String(item.id));
                if (product) {
                    product.stock = Number(product.stock || 0) + Number(item.qty || 0);
                }
            });

            if (sale.method === 'Efectivo' && db.caja.isOpen) {
                db.caja.salesSession = Math.max((Number(db.caja.salesSession) || 0) - (Number(sale.total) || 0), 0);
            } else if (sale.method === 'Credito') {
                const client = db.clients.find(c => String(c.id) === String(sale.clientId));
                if (client) {
                    client.credit = Math.max((Number(client.credit) || 0) - (Number(sale.total) || 0), 0);
                }
            }

            db.sales = db.sales.filter(s => String(s.id) !== String(saleId));
            saveDB();
            renderInventory(document.getElementById('content-area'));
            showToast('Venta eliminada correctamente');
        }

        function addPayment(clientId) {
            const amount = prompt("Ingrese valor del abono:");
            if(amount) {
                const val = parseInt(amount);
                const client = db.clients.find(c => String(c.id) === String(clientId));
                if(client && val > 0) {
                    const applicableAmount = Math.min(val, Number(client.credit) || 0);
                    if (applicableAmount <= 0) return;
                    client.credit -= applicableAmount;
                    if(client.credit < 0) client.credit = 0;
                    applyPaymentToCreditSales(clientId, applicableAmount);
                    db.creditPayments.push({
                        id: generateId(),
                        clientId: client.id,
                        amount: applicableAmount,
                        date: new Date(),
                        user: db.currentUser?.user || 'sistema'
                    });
                    
                    // Registrar el abono como ingreso en su sección independiente de caja
                    if(db.caja.isOpen) {
                        db.caja.creditPaymentSession += applicableAmount;
                        triggerCashDrawer('payment');
                    }

                    saveDB();
                    renderClients(document.getElementById('content-area'));
                    showToast('Abono aplicado exitosamente');
                }
            }
        }

        function applyPaymentToCreditSales(clientId, amount) {
            let remaining = Number(amount) || 0;
            if (remaining <= 0) return;
            const creditSales = (db.sales || [])
                .filter(s => s.method === 'Credito' && String(s.clientId) === String(clientId))
                .sort((a, b) => new Date(a.date) - new Date(b.date));
            creditSales.forEach((sale) => {
                if (remaining <= 0) return;
                const total = Number(sale.total) || 0;
                const paid = Number(sale.paidAmount) || 0;
                const pending = Math.max(total - paid, 0);
                if (pending <= 0) return;
                const allocated = Math.min(remaining, pending);
                sale.paidAmount = paid + allocated;
                remaining -= allocated;
            });
        }

       // --- FUNCIONES DE APOYO (Asegúrate de tenerlas) ---
function formatMoney(amount) {
    return new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
    }).format(amount || 0);
}

function getTopProducts(sales) {
    const counts = {};
    sales.forEach(sale => {
        sale.items.forEach(item => {
            if (!counts[item.name]) {
                counts[item.name] = { name: item.name, qty: 0, total: 0 };
            }
            counts[item.name].qty += item.qty;
            counts[item.name].total += (item.price * item.qty);
        });
    });
    return Object.values(counts).sort((a, b) => b.qty - a.qty).slice(0, 5);
}

function getRangeStartDate(range = 'today') {
    const startDate = new Date();
    if (range === 'today') {
        startDate.setHours(0, 0, 0, 0);
    } else if (range === 'week') {
        const day = startDate.getDay() || 7;
        startDate.setDate(startDate.getDate() - (day - 1));
        startDate.setHours(0, 0, 0, 0);
    } else if (range === 'month') {
        startDate.setDate(1);
        startDate.setHours(0, 0, 0, 0);
    }
    return startDate;
}

function getSalesInRange(range = 'today') {
    const startDate = getRangeStartDate(range);
    return (db.sales || []).filter(s => new Date(s.date) >= startDate);
}

function getExpensesInRange(range = 'today') {
    const startDate = getRangeStartDate(range);
    return (db.expenses || []).filter(e => new Date(e.date) >= startDate);
}

function getRangeTitle(range = 'today') {
    if (range === 'week') return 'Semana';
    if (range === 'month') return 'Mes';
    return 'Hoy';
}

function getProductSalesStats(sales) {
    const map = {};
    sales.forEach((sale) => {
        (sale.items || []).forEach((item) => {
            if (!map[item.name]) map[item.name] = { name: item.name, qty: 0, total: 0 };
            map[item.name].qty += Number(item.qty) || 0;
            map[item.name].total += (Number(item.qty) || 0) * (Number(item.price) || 0);
        });
    });
    const sorted = Object.values(map).sort((a, b) => b.qty - a.qty);
    return { most: sorted[0] || null, least: sorted[sorted.length - 1] || null, list: sorted };
}

// --- MÓDULO DE GANANCIAS CORREGIDO ---
let currentProfitRange = 'today';

function renderProfits(container) {
    if (!container) return; // Evita errores si el contenedor no existe todavía

    const now = new Date();
    let startDate = new Date();
    
    if (currentProfitRange === 'today') {
        startDate.setHours(0,0,0,0);
    } else if (currentProfitRange === 'week') {
        const day = startDate.getDay() || 7; 
        startDate.setDate(startDate.getDate() - (day - 1));
        startDate.setHours(0,0,0,0);
    } else if (currentProfitRange === 'month') {
        startDate.setDate(1);
        startDate.setHours(0,0,0,0);
    }

    // Filtrar con validación por si db.sales o db.expenses están vacíos
    const salesInPeriod = (db.sales || []).filter(s => new Date(s.date) >= startDate);
    const expensesInPeriod = (db.expenses || []).filter(e => new Date(e.date) >= startDate);

    let totalRevenue = 0;
    let totalCost = 0;
    let totalExpenses = expensesInPeriod.reduce((acc, e) => acc + (Number(e.amount) || 0), 0);

    salesInPeriod.forEach(sale => {
        totalRevenue += (Number(sale.total) || 0);
        
        if (sale.items) {
            sale.items.forEach(item => {
                const product = db.products.find(p => p.id === item.id);
                // Si el producto no existe, asumimos costo 0 para no romper el código
                const cost = product ? (Number(product.buyPrice) || 0) : 0;
                totalCost += (cost * item.qty);
            });
        }
    });

    const grossProfit = totalRevenue - totalCost;
