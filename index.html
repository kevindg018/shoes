function getSalesOfToday() {
    return getSalesInRange(currentProfitRange);
}

function exportDailySalesReport(format = 'pdf') {
    const salesToday = getSalesOfToday();
    const today = new Date();
    const totalVentasHoy = salesToday.reduce((acc, s) => acc + (Number(s.total) || 0), 0);
    const totalDescuentos = salesToday.reduce((acc, s) => acc + (Number(s.discount) || 0), 0);
    const totalBruto = salesToday.reduce((acc, s) => {
        const saleSubtotal = (s.items || []).reduce((sum, it) => sum + ((Number(it.qty) || 0) * (Number(it.price) || 0)), 0);
        return acc + saleSubtotal;
    }, 0);

    const totalsByMethod = salesToday.reduce((acc, sale) => {
        const method = sale.method || 'N/A';
        acc[method] = (acc[method] || 0) + (Number(sale.total) || 0);
        return acc;
    }, {});

    const abonosHoy = (db.creditPayments || []).filter(p => new Date(p.date).toDateString() === today.toDateString());
    const totalAbonosHoy = abonosHoy.reduce((acc, p) => acc + (Number(p.amount) || 0), 0);

    const totalEgresosHoy = (db.expenses || [])
        .filter(e => new Date(e.date).toDateString() === today.toDateString())
        .reduce((acc, e) => acc + (Number(e.amount) || 0), 0);

    const efectivoHoy = (totalsByMethod.Efectivo || 0) + totalAbonosHoy;
    const efectivoEsperado = (Number(db.caja.openAmount) || 0) + efectivoHoy - totalEgresosHoy;

    const detailRows = salesToday.length
        ? salesToday.map((sale, idx) => {
            const itemsDetail = (sale.items || []).map(item => {
                const qty = formatQty(item.qty);
                const unit = formatMoney(item.price);
                const lineTotal = formatMoney((Number(item.qty) || 0) * (Number(item.price) || 0));
                return `${qty} x ${item.name} (${unit}) = ${lineTotal}`;
            }).join(' | ');
            return [
                idx + 1,
                new Date(sale.date).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                sale.method || 'N/A',
                formatMoney(sale.total),
                formatMoney(sale.discount || 0),
                itemsDetail || 'Sin detalle'
            ];
        })
        : [['-', '-', 'Sin ventas', formatMoney(0), formatMoney(0), 'Sin detalle']];

    const resumenRows = [
        ['Ventas brutas (sin descuentos)', formatMoney(totalBruto)],
        ['Descuentos aplicados', formatMoney(totalDescuentos)],
        ['Total neto vendido', formatMoney(totalVentasHoy)],
        ['Total abonos recibidos', formatMoney(totalAbonosHoy)],
        ['Egresos en efectivo', `-${formatMoney(totalEgresosHoy)}`],
        ['Efectivo esperado en caja', formatMoney(efectivoEsperado)]
    ];

    Object.entries(totalsByMethod).forEach(([method, value]) => {
        resumenRows.push([`Total por ${method}`, formatMoney(value)]);
    });

    if (format === 'excel') {
        const detalleExcelRows = detailRows.map(row => ({
            '#': row[0],
            Hora: row[1],
            Método: row[2],
            Total: row[3],
            Descuento: row[4],
            Productos: row[5]
        }));

        const resumenExcelRows = resumenRows.map(([Concepto, Valor]) => ({ Concepto, Valor }));

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detalleExcelRows), 'DetalleVentas');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumenExcelRows), 'ResumenCaja');

        XLSX.writeFile(wb, `Ventas_Detalladas_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast('Reporte detallado de ventas (Excel) generado');
        return;
    }

    const productStats = getProductSalesStats(salesToday);
    resumenRows.push(['Producto más vendido', productStats.most ? `${productStats.most.name} (x${formatQty(productStats.most.qty)})` : 'N/A']);
    resumenRows.push(['Producto menos vendido', productStats.least ? `${productStats.least.name} (x${formatQty(productStats.least.qty)})` : 'N/A']);

    const doc = new jspdf.jsPDF({ orientation: 'landscape' });
    doc.setFontSize(15);
    doc.text(`Reporte detallado de ventas (${currentProfitRange})`, 148, 15, null, null, 'center');
    doc.setFontSize(10);
    doc.text(`Fecha: ${today.toLocaleDateString()}`, 10, 24);
    doc.text(`Usuario: ${db.currentUser?.name || 'Sistema'}`, 10, 30);

    doc.autoTable({
        startY: 36,
        head: [['#', 'Hora', 'Método', 'Total', 'Descuento', 'Detalle de productos']],
        body: detailRows,
        styles: { fontSize: 8, cellPadding: 2 },
        columnStyles: {
            0: { halign: 'center', cellWidth: 10 },
            3: { halign: 'right', cellWidth: 28 },
            4: { halign: 'right', cellWidth: 28 },
            5: { cellWidth: 130 }
        }
    });

    doc.text('Resumen de caja y ventas', 10, doc.lastAutoTable.finalY + 10);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 14,
        head: [['Concepto', 'Valor']],
        body: resumenRows,
        styles: { fontSize: 9 },
        columnStyles: { 1: { halign: 'right', fontStyle: 'bold' } }
    });

    doc.save(`Ventas_Detalladas_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('Reporte detallado de ventas (PDF) generado');
}

function exportProfitsReport(format = 'pdf') {
    let startDate = new Date();
    if (currentProfitRange === 'today') {
        startDate.setHours(0,0,0,0);
    } else if (currentProfitRange === 'week') {
        const day = startDate.getDay() || 7;
        startDate.setDate(startDate.getDate() - (day - 1));
        startDate.setHours(0,0,0,0);
    } else {
        startDate.setDate(1);
        startDate.setHours(0,0,0,0);
    }

    const salesInPeriod = (db.sales || []).filter(s => new Date(s.date) >= startDate);
    const expensesInPeriod = (db.expenses || []).filter(e => new Date(e.date) >= startDate);
    const totalRevenue = salesInPeriod.reduce((acc, sale) => acc + (Number(sale.total) || 0), 0);
    let totalCost = 0;
    salesInPeriod.forEach(sale => {
        (sale.items || []).forEach(item => {
            const product = db.products.find(p => p.id === item.id);
            totalCost += (Number(product?.buyPrice) || 0) * item.qty;
        });
    });
    const totalExpenses = expensesInPeriod.reduce((acc, e) => acc + (Number(e.amount) || 0), 0);
    const netProfit = totalRevenue - totalCost - totalExpenses;
    const periodTitle = currentProfitRange === 'today' ? 'Hoy' : currentProfitRange === 'week' ? 'Semana' : 'Mes';

    if (format === 'excel') {
        const data = [
            { Concepto: 'Periodo', Valor: periodTitle },
            { Concepto: 'Ventas', Valor: formatMoney(totalRevenue) },
            { Concepto: 'Costo de ventas', Valor: formatMoney(totalCost) },
            { Concepto: 'Gastos', Valor: formatMoney(totalExpenses) },
            { Concepto: 'Ganancia neta', Valor: formatMoney(netProfit) }
        ];
        const productStats = getProductSalesStats(salesInPeriod);
        data.push({ Concepto: 'Producto más vendido', Valor: productStats.most ? `${productStats.most.name} (x${formatQty(productStats.most.qty)})` : 'N/A' });
        data.push({ Concepto: 'Producto menos vendido', Valor: productStats.least ? `${productStats.least.name} (x${formatQty(productStats.least.qty)})` : 'N/A' });
        const detailSales = salesInPeriod.map((sale) => ({
            Fecha: new Date(sale.date).toLocaleString(),
            Factura: String(sale.id || '').slice(-8),
            Metodo: sale.method || 'N/A',
            Total: Number(sale.total) || 0,
            Productos: (sale.items || []).map(it => `${it.name} x${formatQty(it.qty)}`).join(' | ')
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Ganancias');
        XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(detailSales), 'VentasDetalladas');
        XLSX.writeFile(wb, `Ganancias_${periodTitle}_${new Date().toISOString().slice(0,10)}.xlsx`);
        showToast('Reporte de ganancias (Excel) generado');
        return;
    }

    const doc = new jspdf.jsPDF();
    doc.setFontSize(15);
    doc.text('Reporte de ganancias', 105, 15, null, null, 'center');
    doc.setFontSize(10);
    doc.text(`Periodo: ${periodTitle}`, 10, 24);
    doc.text(`Generado: ${new Date().toLocaleString()}`, 10, 30);

    const productStats = getProductSalesStats(salesInPeriod);
    doc.autoTable({
        startY: 36,
        head: [['Concepto', 'Valor']],
        body: [
            ['Ventas', formatMoney(totalRevenue)],
            ['Costo de ventas', formatMoney(totalCost)],
            ['Gastos', formatMoney(totalExpenses)],
            ['Ganancia neta', formatMoney(netProfit)],
            ['Producto más vendido', productStats.most ? `${productStats.most.name} (x${formatQty(productStats.most.qty)})` : 'N/A'],
            ['Producto menos vendido', productStats.least ? `${productStats.least.name} (x${formatQty(productStats.least.qty)})` : 'N/A']
        ],
        styles: { fontSize: 10 },
        columnStyles: { 1: { halign: 'right', fontStyle: 'bold' } }
    });

    const salesRows = salesInPeriod.map((sale, idx) => [idx + 1, new Date(sale.date).toLocaleString(), sale.method || 'N/A', formatMoney(sale.total), (sale.items || []).map(it => `${it.name} x${formatQty(it.qty)}`).join(' | ')]);
    doc.autoTable({
        startY: doc.lastAutoTable.finalY + 8,
        head: [['#', 'Fecha', 'Método', 'Total', 'Productos']],
        body: salesRows.length ? salesRows : [['-', '-', '-', '-', 'Sin ventas']],
        styles: { fontSize: 8 }
    });

    doc.save(`Ganancias_${periodTitle}_${new Date().toISOString().slice(0,10)}.pdf`);
    showToast('Reporte de ganancias (PDF) generado');
}

        function normalizeImportedDB(inputDb) {
    const parsed = JSON.parse(JSON.stringify(inputDb || {}));
    const normalized = {
        ...JSON.parse(JSON.stringify(initialData)),
        ...parsed
    };

    normalized.products = (normalized.products || []).map((product) => {
        const stock = Number(product.stock);
        const sellPrice = Number(product.sellPrice ?? product.sellPrices?.[0] ?? 0);
        const sellPrices = [0, 1, 2].map((idx) => {
            const value = product.sellPrices?.[idx];
            if (value === null || value === undefined || value === '') return idx === 0 ? sellPrice : null;
            const parsedValue = Number(value);
            return Number.isFinite(parsedValue) ? parsedValue : (idx === 0 ? sellPrice : null);
        });
        return {
            ...product,
            stock: Number.isFinite(stock) && stock >= 0 ? stock : 0,
            sellPrice: sellPrices[0],
            sellPrices
        };
    });

    normalized.sales = (normalized.sales || []).map((sale) => ({
        ...sale,
        items: (sale.items || []).map((item) => ({
            ...item,
            qty: Number(item.qty) || 0,
            price: Number(item.price) || 0
        })),
        total: Number(sale.total) || 0,
        discount: Number(sale.discount) || 0,
        paidAmount: Number(sale.paidAmount) || 0,
        invoiceHtml: typeof sale.invoiceHtml === 'string' ? sale.invoiceHtml : ''
    }));

    normalized.creditPayments = (normalized.creditPayments || []).map((payment) => ({
        ...payment,
        amount: Number(payment.amount) || 0
    }));

    if (!normalized.caja || typeof normalized.caja !== 'object') normalized.caja = JSON.parse(JSON.stringify(initialData.caja));
    if (!Array.isArray(normalized.caja.history)) normalized.caja.history = [];
    if (normalized.caja.creditPaymentSession === undefined) normalized.caja.creditPaymentSession = 0;
    if (normalized.caja.expenseSession === undefined) normalized.caja.expenseSession = 0;
    if (!Array.isArray(normalized.openTickets)) normalized.openTickets = [];

    return normalized;
}

        document.getElementById("exportarDatos").addEventListener("click", () => {
    const dbToExport = localStorage.getItem(DB_KEY);
    if (!dbToExport) {
        alert("⚠️ No hay datos para exportar.");
        return;
    }

    const payload = {
        app: 'NewCloud POS',
        schema: 1,
        generatedAt: new Date().toISOString(),
        db: JSON.parse(dbToExport)
    };

    const dataStr = JSON.stringify(payload, null, 2);
    const blob = new Blob([dataStr], { type: "application/json" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = `RESPALDO_POS_${new Date().toISOString().slice(0,10)}.json`;
    a.click();

    URL.revokeObjectURL(url);
    alert("✅ Respaldo generado con éxito");
});

document.getElementById("importarDatos").addEventListener("click", () => {
  document.getElementById("importarArchivo").click();
});

document.getElementById("importarArchivo").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = () => {
    try {
      const raw = JSON.parse(reader.result);
      const incomingDb = raw?.db && typeof raw.db === 'object' ? raw.db : raw;

      if (!incomingDb || typeof incomingDb !== 'object' || !Array.isArray(incomingDb.products) || !Array.isArray(incomingDb.sales)) {
        alert("Archivo inválido: falta estructura de productos/ventas ❌");
        return;
      }

      if (!confirm("Esto reemplazará los datos actuales. ¿Continuar?")) return;

      const normalized = normalizeImportedDB(incomingDb);
      localStorage.setItem(DB_KEY, JSON.stringify(normalized));

      alert("Datos importados correctamente 🎉");
      location.reload();
    } catch (err) {
      alert("Archivo inválido ❌");
    } finally {
      e.target.value = '';
    }
  };

  reader.readAsText(file);
});
